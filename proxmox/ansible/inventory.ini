# LabOps — Ansible Inventory
# Update VM IPs after they boot and get DHCP addresses.
# Find IPs via your router's DHCP table or Proxmox QEMU guest agent.

[win11_vms]
# lab-win11-1 ansible_host=<VM_IP>  ansible_user=<ADMIN_USER> ansible_password=<ADMIN_PASS> ansible_connection=winrm ansible_winrm_transport=ntlm ansible_port=5985

[winserver_vms]
# lab-winserver-1 ansible_host=<VM_IP>  ansible_user=Administrator ansible_password=<ADMIN_PASS> ansible_connection=winrm ansible_winrm_transport=ntlm ansible_port=5985

[all_vms:children]
win11_vms
winserver_vms

[all_vms:vars]
ansible_winrm_server_cert_validation=ignore
