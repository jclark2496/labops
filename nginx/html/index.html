<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabOps — Control Center</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header Layout ────────────────────────────────────────────────────────── */
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark { display: none; }

    .health-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      font-family: var(--ft);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .health-badge.healthy { border-color: rgba(0,255,65,.3); color: var(--c-green); }
    .health-badge.degraded { border-color: rgba(255,179,0,.3); color: var(--c-warn); }
    .health-badge.down { border-color: rgba(255,68,68,.28); color: var(--c-fail); }

    .health-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .refresh-label {
      font-family: var(--fm);
      font-size: 11px;
      color: var(--text-sec);
      letter-spacing: .04em;
    }

    /* ── Main Layout ────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 1024px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── VM Cards ───────────────────────────────────────────────────────────── */
    .vm-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .vm-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      transition: border-color .15s;
    }

    .vm-card:hover {
      border-color: var(--border-acc);
    }

    .vm-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vm-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vm-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--ft);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
    }

    .vm-status.running { background: rgba(0,255,65,.1); color: var(--c-green); }
    .vm-status.stopped { background: rgba(235,246,255,.05); color: var(--text-dim); }
    .vm-status.error { background: rgba(255,68,68,.1); color: var(--c-fail); }

    .vm-status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .vm-meta {
      font-size: 12px;
      color: var(--text-sec);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .vm-meta span { display: flex; align-items: center; gap: 4px; }

    .vm-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Provision Form ─────────────────────────────────────────────────────── */
    .btn-primary {
      background: rgba(0,237,255,.1);
      border-color: var(--border-acc);
      color: var(--accent-cyan);
    }

    .btn-primary:hover {
      background: rgba(0,237,255,.18);
      border-color: var(--accent-cyan);
    }

    .provision-form {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--bg-panel);
      border: 1px dashed rgba(var(--accent-cyan-rgb),0.16);
      border-radius: var(--radius);
      margin-top: 10px;
    }

    .provision-form select {
      font-family: var(--fm);
      font-size: 11px;
      background: #060c24;
      border: 1px solid rgba(var(--accent-cyan-rgb),0.16);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 3px;
      flex: 1;
      color-scheme: dark;
    }

    .provision-form select:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    /* ── Container Status ───────────────────────────────────────────────────── */
    .svc-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .svc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 4px;
      transition: background .1s;
    }

    .svc-row:hover {
      background: rgba(0,237,255,.03);
    }

    .svc-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .svc-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .svc-dot.healthy { background: var(--c-green); box-shadow: 0 0 6px rgba(0,255,65,.4); }
    .svc-dot.starting { background: var(--c-warn); box-shadow: 0 0 6px rgba(255,179,0,.4); }
    .svc-dot.unhealthy { background: var(--c-fail); box-shadow: 0 0 6px rgba(255,68,68,.4); }

    .svc-status {
      font-family: var(--ft);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .svc-status.healthy { color: var(--c-green); }
    .svc-status.starting { color: var(--c-warn); }
    .svc-status.unhealthy { color: var(--c-fail); }

    /* ── Quick Links ────────────────────────────────────────────────────────── */
    .links-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-sec);
      font-size: 11px;
      font-weight: 500;
      transition: all .15s;
    }

    .link-card:hover {
      border-color: var(--border-acc);
      color: var(--accent-cyan);
      background: rgba(0,237,255,.03);
    }

    .link-icon {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 14px;
      background: var(--border-dim);
      flex-shrink: 0;
    }

    .link-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .link-title {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .02em;
    }

    .link-sub {
      font-size: 11px;
      color: var(--text-sec);
      letter-spacing: .02em;
    }

    /* ── Right Column Stack ─────────────────────────────────────────────────── */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Toast ──────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-elevated);
      border: 1px solid var(--border-acc);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 500;
      z-index: 9999;
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Empty State ────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .empty-state .empty-icon {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: .4;
    }

    /* ── Loading Skeleton ───────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-panel) 25%, var(--bg-elevated) 50%, var(--bg-panel) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      height: 60px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Confirm Modal ──────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 5000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border-acc);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 400px;
      width: 90%;
    }

    .modal-title {
      font-family: var(--ft);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .modal-body {
      font-size: 12px;
      color: var(--text-sec);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Entry animation ────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    .panel { animation: fadeUp .4s ease-out both; }
    .grid > :nth-child(1) .panel { animation-delay: .05s; }
    .right-col > :nth-child(1) { animation-delay: .1s; }
    .right-col > :nth-child(2) { animation-delay: .15s; }

    /* Nav menu styles now in shared.css */
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header class="shared-header">
  <div class="header-left">
    <div class="shared-wordmark">
      <span class="wm-primary">SOPHOS</span>
      <span class="wm-accent wm-accent-green">LAB_OPS</span>
      <span class="wm-slash">//</span>
      <span class="wm-page wm-page-green">dashboard</span>
    </div>
  </div>
  <div class="shared-hdr-right">
    <span class="refresh-label" id="last-refresh">Updated just now</span>
    <div class="health-badge healthy" id="health-badge">
      <span class="health-dot"></span>
      <span id="health-text">ALL SYSTEMS OK</span>
    </div>
    <div class="nav-wrap" id="nav-wrap">
      <button class="nav-btn" id="nav-btn" onclick="navToggle()">&#x2630; Menu</button>
      <div class="nav-dd" id="nav-dd">
        <button class="nav-it" onclick="navToggle();window.open('http://' + location.hostname + ':8080','_blank')">SE Console</button>
        <button class="nav-it" onclick="navToggle();window.location.href='index.html'">Lab Manager</button>
        <button class="nav-it" onclick="navToggle();window.open('http://' + location.hostname + ':8080/admin.html','_blank')">Scenario Studio</button>
        <button class="nav-it" onclick="navToggle();window.open('http://' + location.hostname + ':8080/architecture.html','_blank')">Architecture</button>
        <button class="nav-it" onclick="navToggle();window.open('https://central.sophos.com','_blank')">Sophos Central</button>
        <button class="nav-it" onclick="navToggle();window.open('/settings.html','_blank')">Platform Settings</button>
      </div>
    </div>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────────────────────── -->
<div class="main">
  <div class="grid">

    <!-- LEFT: Virtual Machines -->
    <div>
      <div class="panel">
        <div class="panel-hdr">
          <span class="panel-title">Virtual Machines</span>
          <span class="panel-badge" id="vm-count">0 VMs</span>
        </div>
        <div class="panel-body">
          <div class="vm-list" id="vm-list">
            <div class="skeleton"></div>
            <div class="skeleton" style="height:40px"></div>
          </div>

          <!-- Provision form -->
          <div class="provision-form">
            <select id="template-select">
              <option value="win11">Windows 11</option>
              <option value="win11-unmanaged">Windows 11 (Unmanaged)</option>
              <option value="winserver">Windows Server</option>
            </select>
            <button class="btn btn-primary" onclick="provisionVM()">+ Provision</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Services + Links -->
    <div class="right-col">

      <!-- Docker Services -->
      <div class="panel">
        <div class="panel-hdr">
          <span class="panel-title">Services</span>
          <span class="panel-badge" id="svc-count">6 containers</span>
        </div>
        <div class="panel-body">
          <div class="svc-list" id="svc-list">
            <div class="skeleton" style="height:32px"></div>
            <div class="skeleton" style="height:32px"></div>
            <div class="skeleton" style="height:32px"></div>
          </div>
        </div>
      </div>

      <!-- Quick Links -->
      <div class="panel">
        <div class="panel-hdr">
          <span class="panel-title">Quick Links</span>
        </div>
        <div class="panel-body">
          <div class="links-grid">
            <a class="link-card" id="link-guacamole" href="/guacamole" target="_blank">
              <div class="link-icon">🖥</div>
              <div class="link-label">
                <span class="link-title">Guacamole</span>
                <span class="link-sub">RDP Gateway</span>
              </div>
            </a>
            <a class="link-card" id="link-portainer" href="http://localhost:9000" target="_blank">
              <div class="link-icon">📦</div>
              <div class="link-label">
                <span class="link-title">Portainer</span>
                <span class="link-sub">Containers</span>
              </div>
            </a>
            <a class="link-card" id="link-proxmox" href="#" target="_blank" onclick="openProxmox(event)">
              <div class="link-icon">🔧</div>
              <div class="link-label">
                <span class="link-title">Proxmox</span>
                <span class="link-sub">Hypervisor</span>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ── CONFIRM MODAL ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<script>
// ── Nav Menu ──────────────────────────────────────────────────────────────────
function navToggle() { document.getElementById('nav-dd').classList.toggle('open'); }
document.addEventListener('click', function(e) {
  var w = document.getElementById('nav-wrap');
  if (w && !w.contains(e.target)) document.getElementById('nav-dd').classList.remove('open');
});

// ── Configuration ─────────────────────────────────────────────────────────────
// These are loaded from the /api/config endpoint or fall back to defaults.
// Guac credentials come from .env via n8n → injected into /api/config response.
let CONFIG = {
  guacProxy:     '/guacamole',
  guacAdmin:     'guacadmin',
  guacAdminPw:   'guacadmin',
  guacDs:        'postgresql',
  vmUser:        'demo',
  vmPassword:    '',
  proxmoxUrl:    '',
};

const VM_REFRESH_MS  = 15000;
const SVC_REFRESH_MS = 10000;

let pendingAction = null;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await loadConfig();
  fetchVMs();
  fetchContainers();
  setInterval(fetchVMs, VM_REFRESH_MS);
  setInterval(fetchContainers, SVC_REFRESH_MS);
  setInterval(updateRefreshLabel, 5000);
});

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    if (r.ok) {
      const cfg = await r.json();
      Object.assign(CONFIG, cfg);
    }
  } catch(e) {
    // Config endpoint not available — use defaults
  }

  // Update quick links with actual URLs and ports
  const host = window.location.hostname;
  if (CONFIG.proxmoxUrl) {
    document.getElementById('link-proxmox').href = CONFIG.proxmoxUrl;
  }
  if (CONFIG.portainerPort) {
    document.getElementById('link-portainer').href = `http://${host}:${CONFIG.portainerPort}`;
  }
  if (CONFIG.n8nPort) {
    document.getElementById('link-n8n').href = `http://${host}:${CONFIG.n8nPort}`;
  }
  if (CONFIG.guacPort) {
    document.getElementById('link-guacamole').href = `http://${host}:${CONFIG.guacPort}/guacamole`;
  }
}

// ── VM Management ─────────────────────────────────────────────────────────────
let lastVMFetch = Date.now();

async function fetchVMs() {
  try {
    const r = await fetch('/api/vms');
    if (!r.ok) throw new Error(`${r.status}`);
    const data = await r.json();
    lastVMFetch = Date.now();
    renderVMs(data.vms || []);
    updateHealthBadge();
  } catch(e) {
    // Show empty state with error
    const list = document.getElementById('vm-list');
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠</div>
        <div>Cannot reach Proxmox API</div>
        <div style="margin-top:6px;font-size:10px;color:rgba(232,240,255,0.18)">
          Check PROXMOX_URL in your .env file
        </div>
      </div>`;
    document.getElementById('vm-count').textContent = 'offline';
  }
}

function renderVMs(vms) {
  const list = document.getElementById('vm-list');
  const countEl = document.getElementById('vm-count');

  // Filter to lab VMs (IDs 200-299)
  const labVMs = vms.filter(v => v.vmid >= 200 && v.vmid < 300);
  countEl.textContent = `${labVMs.length} VM${labVMs.length !== 1 ? 's' : ''}`;

  if (labVMs.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">☁</div>
        <div>No lab VMs provisioned</div>
        <div style="margin-top:6px;font-size:10px;color:rgba(232,240,255,0.18)">
          Use the form below to provision your first VM
        </div>
      </div>`;
    return;
  }

  list.innerHTML = labVMs.map(vm => {
    const isRunning = vm.status === 'running';
    const statusClass = isRunning ? 'running' : (vm.status === 'stopped' ? 'stopped' : 'error');
    const ip = vm.ip || '—';
    const tags = (vm.tags || '').split(';').filter(Boolean);
    const templateLabel = tags.includes('unmanaged') ? 'Unmanaged' :
                          tags.includes('windows-server') ? 'Win Server' : 'Windows 11';

    return `
      <div class="vm-card">
        <div class="vm-info">
          <div class="vm-name">
            ${vm.name || 'vm-' + vm.vmid}
            <span class="vm-status ${statusClass}">
              <span class="vm-status-dot"></span>
              ${vm.status}
            </span>
          </div>
          <div class="vm-meta">
            <span>ID: ${vm.vmid}</span>
            <span>IP: ${ip}</span>
            <span>${templateLabel}</span>
            ${vm.uptime ? `<span>Up: ${formatUptime(vm.uptime)}</span>` : ''}
          </div>
        </div>
        <div class="vm-actions">
          ${isRunning ? `
            <button class="btn btn-connect" onclick="connectRDP('${ip}', '${vm.name || 'vm-' + vm.vmid}')" ${ip === '—' ? 'disabled title="No IP detected"' : ''}>
              Connect RDP
            </button>
            <button class="btn" onclick="vmAction('stop', ${vm.vmid}, '${vm.name}')">Stop</button>
          ` : `
            <button class="btn btn-primary" onclick="vmAction('start', ${vm.vmid}, '${vm.name}')">Start</button>
          `}
          <button class="btn btn-danger" onclick="confirmDestroy(${vm.vmid}, '${vm.name || 'vm-' + vm.vmid}')">Destroy</button>
        </div>
      </div>`;
  }).join('');
}

function formatUptime(seconds) {
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
  return `${Math.floor(seconds / 86400)}d ${Math.floor((seconds % 86400) / 3600)}h`;
}

async function vmAction(action, vmid, name) {
  toast(`${action === 'start' ? 'Starting' : 'Stopping'} ${name || 'VM ' + vmid}...`);
  try {
    const r = await fetch(`/api/vms/${vmid}/${action}`, { method: 'POST' });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    toast(`${name || 'VM ' + vmid} ${action === 'start' ? 'started' : 'stopped'}`);
    setTimeout(fetchVMs, 2000);
  } catch(e) {
    toast(`Error: ${e.message}`);
  }
}

function confirmDestroy(vmid, name) {
  pendingAction = () => destroyVM(vmid, name);
  document.getElementById('modal-title').textContent = 'DESTROY VM';
  document.getElementById('modal-body').textContent = `This will permanently destroy ${name} (ID: ${vmid}). This action cannot be undone.`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function destroyVM(vmid, name) {
  closeModal();
  toast(`Destroying ${name}...`);
  try {
    const r = await fetch(`/api/vms/${vmid}/destroy`, { method: 'DELETE' });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    toast(`${name} destroyed`);
    setTimeout(fetchVMs, 2000);
  } catch(e) {
    toast(`Error: ${e.message}`);
  }
}

async function provisionVM() {
  const select = document.getElementById('template-select');
  const template = select.value;
  toast(`Provisioning ${select.options[select.selectedIndex].text}...`);
  try {
    const r = await fetch('/api/vms/provision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template })
    });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    toast('Provisioning started — VM will appear in ~60s');
    setTimeout(fetchVMs, 10000);
  } catch(e) {
    toast(`Error: ${e.message}`);
  }
}

// ── RDP via Guacamole ─────────────────────────────────────────────────────────
async function connectRDP(ip, vmName) {
  if (!ip || ip === '—') { toast('No IP address available'); return; }

  toast(`Connecting to ${vmName} (${ip})...`);

  try {
    // 1. Authenticate with Guacamole
    const fd = new URLSearchParams({
      username: CONFIG.guacAdmin,
      password: CONFIG.guacAdminPw
    });
    const authR = await fetch(`${CONFIG.guacProxy}/api/tokens`, { method: 'POST', body: fd });
    if (!authR.ok) throw new Error(`Guacamole auth failed (${authR.status})`);
    const auth = await authR.json();
    const token = auth.authToken;

    // 2. Create RDP connection
    const connR = await fetch(
      `${CONFIG.guacProxy}/api/session/data/${CONFIG.guacDs}/connections?token=${token}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: `labops-${vmName}-${Date.now()}`,
          protocol: 'rdp',
          parameters: {
            hostname:        ip,
            port:            '3389',
            username:        CONFIG.vmUser,
            password:        CONFIG.vmPassword,
            'ignore-cert':   'true',
            security:        'any',
            'resize-method': 'reconnect',
            'enable-font-smoothing': 'true'
          },
          attributes: {
            'max-connections':          '2',
            'max-connections-per-user': '2'
          }
        })
      }
    );
    if (!connR.ok) throw new Error(`Failed to create RDP connection (${connR.status})`);
    const conn = await connR.json();

    // 3. Open in new tab
    const clientId = btoa(`${conn.identifier}\0c\0${CONFIG.guacDs}`);
    const rdpURL = `${CONFIG.guacProxy}/?token=${token}#/client/${encodeURIComponent(clientId)}`;
    window.open(rdpURL, `rdp-${vmName}`);

    toast(`RDP session opened for ${vmName}`);
  } catch(e) {
    toast(`RDP Error: ${e.message}`);
  }
}

// ── Container Health ──────────────────────────────────────────────────────────
const EXPECTED_CONTAINERS = [
  { name: 'labops-nginx',         label: 'Nginx',     port: '8080' },
  { name: 'labops-api',           label: 'API',       port: '—' },
  { name: 'labops-guacamole',     label: 'Guacamole', port: '8085' },
  { name: 'labops-guacd',         label: 'guacd',     port: '—' },
  { name: 'labops-guac-postgres', label: 'PostgreSQL', port: '—' },
  { name: 'labops-portainer',     label: 'Portainer', port: '9000' },
];

async function fetchContainers() {
  try {
    const r = await fetch('/api/containers');
    if (!r.ok) throw new Error(`${r.status}`);
    const data = await r.json();
    renderContainers(data.containers || []);
  } catch(e) {
    // If API is down, still show expected containers as unknown
    renderContainers([]);
  }
}

function renderContainers(containers) {
  const list = document.getElementById('svc-list');
  const containerMap = {};
  containers.forEach(c => { containerMap[c.name] = c; });

  let healthyCount = 0;

  list.innerHTML = EXPECTED_CONTAINERS.map(svc => {
    const c = containerMap[svc.name];
    let status = 'unhealthy';
    let statusLabel = 'DOWN';

    if (c) {
      if (c.health === 'healthy' || (c.state === 'running' && !c.health)) {
        status = 'healthy';
        statusLabel = 'HEALTHY';
        healthyCount++;
      } else if (c.state === 'running') {
        status = 'starting';
        statusLabel = c.health || 'STARTING';
        healthyCount += 0.5;
      }
    }

    return `
      <div class="svc-row">
        <span class="svc-name">
          <span class="svc-dot ${status}"></span>
          ${svc.label}
          ${svc.port !== '—' ? `<span style="color:rgba(232,240,255,0.18);font-size:10px">:${svc.port}</span>` : ''}
        </span>
        <span class="svc-status ${status}">${statusLabel}</span>
      </div>`;
  }).join('');

  const countEl = document.getElementById('svc-count');
  countEl.textContent = `${healthyCount}/${EXPECTED_CONTAINERS.length} healthy`;

  updateHealthBadge();
}

// ── Health Badge ──────────────────────────────────────────────────────────────
function updateHealthBadge() {
  const badge = document.getElementById('health-badge');
  const text = document.getElementById('health-text');
  const svcRows = document.querySelectorAll('.svc-dot');
  const total = svcRows.length;
  let healthy = 0;
  svcRows.forEach(d => { if (d.classList.contains('healthy')) healthy++; });

  badge.className = 'health-badge';
  if (healthy === total && total > 0) {
    badge.classList.add('healthy');
    text.textContent = 'ALL SYSTEMS OK';
  } else if (healthy > 0) {
    badge.classList.add('degraded');
    text.textContent = 'DEGRADED';
  } else {
    badge.classList.add('down');
    text.textContent = 'SERVICES DOWN';
  }
}

// ── Refresh Label ─────────────────────────────────────────────────────────────
function updateRefreshLabel() {
  const el = document.getElementById('last-refresh');
  const ago = Math.floor((Date.now() - lastVMFetch) / 1000);
  if (ago < 5) el.textContent = 'Updated just now';
  else if (ago < 60) el.textContent = `Updated ${ago}s ago`;
  else el.textContent = `Updated ${Math.floor(ago / 60)}m ago`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pendingAction = null;
}

function confirmAction() {
  if (pendingAction) pendingAction();
}

// ── Proxmox Link ──────────────────────────────────────────────────────────────
function openProxmox(e) {
  if (!CONFIG.proxmoxUrl) {
    e.preventDefault();
    toast('PROXMOX_URL not configured in .env');
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
