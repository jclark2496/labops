server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Lab Manager Dashboard
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy to n8n webhook endpoints (lab management API)
    location /api/ {
        proxy_pass http://172.20.0.30:5678/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy to Apache Guacamole (browser-based RDP)
    # WebSocket upgrade required for the Guacamole tunnel protocol
    location /guacamole/ {
        proxy_pass http://172.20.0.81:8080/guacamole/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Health check
    location /health {
        return 200 'LabOps OK';
        add_header Content-Type text/plain;
    }
}
