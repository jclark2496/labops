# =============================================================================
# LabOps — Automated Lab Manager
# Docker Compose Service Stack
# =============================================================================
# Usage:
#   Start:    docker compose up -d
#   Stop:     docker compose down
#   Logs:     docker compose logs -f [service]
#   Status:   docker compose ps
#
# Services:
#   nginx       → http://localhost:8080   (Lab Manager Dashboard)
#   n8n         → http://localhost:5678   (Workflow Automation)
#   guacamole   → http://localhost:8085   (Browser-based RDP)
#   portainer   → http://localhost:9000   (Container Management)
# =============================================================================

networks:
  labops-net:
    name: labops-net
    driver: bridge
    ipam:
      config:
        - subnet: ${LAB_NETWORK_SUBNET:-172.20.0.0/24}

volumes:
  portainer-data:
  guac-db:

services:

  # ---------------------------------------------------------------------------
  # Nginx — Lab Manager Dashboard + Reverse Proxy
  # Serves the LabOps dashboard and proxies to Guacamole and n8n
  # UI: http://localhost:8080
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    platform: linux/arm64
    container_name: labops-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      labops-net:
        ipv4_address: 172.20.0.50

  # ---------------------------------------------------------------------------
  # LabOps API — Lightweight Lab Management API
  # Handles VM management, container health, and dashboard config.
  # Replaces n8n for LabOps (n8n is still used by adversary-sim and mdr-demo-lab).
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: labops-api
    restart: unless-stopped
    environment:
      - PROXMOX_URL=${PROXMOX_URL:-}
      - PROXMOX_NODE=${PROXMOX_NODE:-}
      - PROXMOX_TOKEN_ID=${PROXMOX_TOKEN_ID:-}
      - PROXMOX_TOKEN_SECRET=${PROXMOX_TOKEN_SECRET:-}
      - GUAC_ADMIN_USER=${GUAC_ADMIN_USER:-guacadmin}
      - GUAC_ADMIN_PASSWORD=${GUAC_ADMIN_PASSWORD:-guacadmin}
      - LAB_VM_USER=${LAB_VM_USER:-demo}
      - LAB_VM_PASSWORD=${LAB_VM_PASSWORD:-}
      - NGINX_PORT=${NGINX_PORT:-8080}
      - GUAC_PORT=${GUAC_PORT:-8085}
      - PORTAINER_PORT=${PORTAINER_PORT:-9000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/data/repo
    networks:
      labops-net:
        ipv4_address: 172.20.0.30

  # ---------------------------------------------------------------------------
  # Apache Guacamole — Browser-Based RDP/VNC
  # Provides in-browser remote desktop access to lab VMs
  #
  # guac-postgres : connection/user storage
  # guacd         : protocol daemon (internal)
  # guacamole     : web UI + REST API → http://localhost:8085/guacamole
  # ---------------------------------------------------------------------------
  guac-postgres:
    image: postgres:15-alpine
    platform: linux/arm64
    container_name: labops-guac-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=guacamole_db
      - POSTGRES_USER=${GUAC_DB_USER:-guacamole}
      - POSTGRES_PASSWORD=${GUAC_DB_PASSWORD:-guacamole}
    volumes:
      - guac-db:/var/lib/postgresql/data
      - ./guacamole/init:/docker-entrypoint-initdb.d:ro
    networks:
      labops-net:
        ipv4_address: 172.20.0.82
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GUAC_DB_USER:-guacamole}"]
      interval: 10s
      timeout: 5s
      retries: 5

  guacd:
    image: guacamole/guacd:latest
    # guacd is amd64-only; runs via Rosetta on Apple Silicon
    platform: linux/amd64
    container_name: labops-guacd
    restart: unless-stopped
    networks:
      labops-net:
        ipv4_address: 172.20.0.80

  guacamole:
    image: guacamole/guacamole:latest
    # guacamole web app is amd64-only; runs via Rosetta on Apple Silicon
    platform: linux/amd64
    container_name: labops-guacamole
    restart: unless-stopped
    depends_on:
      guac-postgres:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      - GUACD_HOSTNAME=172.20.0.80
      - GUACD_PORT=4822
      - POSTGRESQL_HOSTNAME=172.20.0.82
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_DATABASE=guacamole_db
      - POSTGRESQL_USERNAME=${GUAC_DB_USER:-guacamole}
      - POSTGRESQL_PASSWORD=${GUAC_DB_PASSWORD:-guacamole}
    ports:
      - "${GUAC_PORT:-8085}:8080"
    networks:
      labops-net:
        ipv4_address: 172.20.0.81

  # ---------------------------------------------------------------------------
  # Portainer — Container Management Dashboard
  # UI: http://localhost:9000 (set password on first login — must do within 5 min)
  # ---------------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    platform: linux/arm64
    container_name: labops-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      labops-net:
        ipv4_address: 172.20.0.60
